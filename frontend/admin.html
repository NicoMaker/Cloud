<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pannello Admin — Gestore File</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="css/admin.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="img/Logo.png" />
  </head>
  <body>
    <!-- TOPBAR -->
    <nav class="topbar">
      <div class="topbar-inner">
        <a class="topbar-brand" href="/dashboard.html">
          <img
            src="img/Logo.png"
            alt="Logo"
            class="topbar-logo"
            onerror="
              this.style.display = 'none';
              this.nextElementSibling.style.display = 'inline-block';
            "
          />
          <i class="fas fa-shield-alt" style="display: none"></i>
          <span>Pannello Admin</span>
        </a>
        <div class="topbar-actions">
          <a href="/dashboard.html" class="tb-btn tb-btn-ghost">
            <i class="fas fa-arrow-left"></i
            ><span class="tb-btn-label">Dashboard</span>
          </a>
          <a href="/logout" class="tb-btn tb-btn-ghost">
            <i class="fas fa-sign-out-alt"></i
            ><span class="tb-btn-label">Esci</span>
          </a>
        </div>
      </div>
    </nav>

    <main class="admin-main">
      <!-- Alerts -->
      <div id="alertContainer" style="margin-bottom: 0.5rem"></div>

      <!-- Crea utente -->
      <div class="admin-card">
        <div class="admin-card-header">
          <i class="fas fa-user-plus"></i>
          <h2>Crea nuovo utente</h2>
        </div>
        <div class="admin-card-body">
          <form method="POST" action="/create-user" class="create-user-form">
            <div class="form-field">
              <label class="form-field-label">Nome utente</label>
              <div class="form-input-wrap">
                <i class="fas fa-user form-input-icon"></i>
                <input
                  type="text"
                  class="admin-input"
                  id="username"
                  name="username"
                  required
                  placeholder="es. mario.rossi"
                />
              </div>
            </div>

            <div class="form-field">
              <label class="form-field-label">Password</label>
              <div class="form-input-wrap">
                <i class="fas fa-lock form-input-icon"></i>
                <input
                  type="password"
                  class="admin-input has-icon"
                  id="password"
                  name="password"
                  required
                  placeholder="••••••••"
                />
                <button
                  class="toggle-pw"
                  type="button"
                  onclick="togglePassword('password', 'eyeCreate')"
                  tabindex="-1"
                >
                  <i class="fas fa-eye" id="eyeCreate"></i>
                </button>
              </div>
              <div class="pw-strength-bar">
                <div class="pw-strength-fill" id="passwordStrength"></div>
              </div>
              <div class="pw-requirements">
                <div class="pw-req-title">
                  <i class="fas fa-shield-halved"></i> Requisiti
                </div>
                <div class="pw-req-grid">
                  <span class="req-item" id="req-length"
                    ><i class="fas fa-circle"></i> 8+ caratteri</span
                  >
                  <span class="req-item" id="req-upper"
                    ><i class="fas fa-circle"></i> Maiuscola</span
                  >
                  <span class="req-item" id="req-lower"
                    ><i class="fas fa-circle"></i> Minuscola</span
                  >
                  <span class="req-item" id="req-number"
                    ><i class="fas fa-circle"></i> Numero</span
                  >
                  <span class="req-item" id="req-special"
                    ><i class="fas fa-circle"></i> Speciale</span
                  >
                </div>
              </div>
            </div>

            <div class="form-field">
              <label class="form-field-label">Ruolo</label>
              <select class="admin-input" id="role" name="role" required>
                <option value="user">Utente</option>
                <option value="admin">Admin</option>
              </select>
              <p class="field-note">
                <i class="fas fa-info-circle"></i>
                Puoi creare più amministratori. Il sistema mantiene sempre
                almeno un admin attivo.
              </p>
            </div>

            <div class="form-field form-field-action">
              <button
                type="submit"
                class="admin-btn admin-btn-primary"
                id="createUserBtn"
                disabled
              >
                <i class="fas fa-plus"></i> Crea utente
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Lista utenti -->
      <div class="admin-card">
        <div class="admin-card-header">
          <i class="fas fa-users"></i>
          <h2>Gestione utenti</h2>
        </div>
        <div class="admin-card-body p-0">
          <div class="user-table-wrap">
            <table class="user-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Nome utente</th>
                  <th>Ruolo</th>
                  <th>Creato</th>
                  <th>Ultimo accesso</th>
                  <th>Azioni</th>
                </tr>
              </thead>
              <tbody id="userTable">
                <tr>
                  <td colspan="6" class="table-placeholder">
                    <i class="fas fa-spinner fa-spin"></i> Caricamento utenti…
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
      <div class="footer-inner">
        <div class="footer-brand">
          <img
            src="img/Logo.png"
            alt="Logo"
            class="footer-logo"
            onerror="this.style.display = 'none'"
          />
          <span id="footerCompanyName"></span>
        </div>
        <div class="footer-meta">
          <span
            ><i class="fas fa-id-card"></i> <span id="footerVat"></span
          ></span>
          <span class="footer-sep">·</span>
          <span
            ><i class="fas fa-map-marker-alt"></i>
            <span id="footerAddress"></span
          ></span>
        </div>
      </div>
    </footer>

    <!-- MODAL Modifica utente -->
    <div class="modal fade" id="editUserModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content modal-modern">
          <div class="modal-header modal-header-brand">
            <h5 class="modal-title">
              <i class="fas fa-user-edit me-2"></i>Modifica utente
            </h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <form method="POST" action="/update-user">
            <div class="modal-body-pad">
              <input type="hidden" id="editUserId" name="id" />

              <div class="form-field">
                <label class="form-field-label">Nome utente</label>
                <div class="form-input-wrap">
                  <i class="fas fa-user form-input-icon"></i>
                  <input
                    type="text"
                    class="admin-input"
                    id="editUsername"
                    name="username"
                    required
                    placeholder="Nome utente"
                  />
                </div>
              </div>

              <div class="form-field">
                <label class="form-field-label"
                  >Nuova password
                  <span class="optional">(vuoto = invariata)</span></label
                >
                <div class="form-input-wrap">
                  <i class="fas fa-lock form-input-icon"></i>
                  <input
                    type="password"
                    class="admin-input"
                    id="editPassword"
                    name="password"
                    placeholder="••••••••"
                  />
                  <button
                    class="toggle-pw"
                    type="button"
                    onclick="togglePassword('editPassword', 'eyeEdit')"
                    tabindex="-1"
                  >
                    <i class="fas fa-eye" id="eyeEdit"></i>
                  </button>
                </div>
                <div class="pw-strength-bar">
                  <div class="pw-strength-fill" id="editPasswordStrength"></div>
                </div>
              </div>

              <div class="form-field">
                <label class="form-field-label">Ruolo</label>
                <select class="admin-input" id="editRole" name="role" required>
                  <option value="user">Utente</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
            </div>
            <div class="modal-footer-custom">
              <button
                type="button"
                class="admin-btn admin-btn-ghost"
                data-bs-dismiss="modal"
              >
                Annulla
              </button>
              <button type="submit" class="admin-btn admin-btn-primary">
                <i class="fas fa-save"></i> Salva modifiche
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/company.js"></script>
  </body>
</html>
