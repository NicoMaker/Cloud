<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Gestore File Avanzato</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <link href="css/login.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="img/Logo.png" />
  </head>

  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="login-container">
            <div class="login-header">
              <img src="img/logo.png" alt="Logo Aziendale" class="mb-3 login-logo"
                onerror="this.onerror=null; this.style.display='none'; document.getElementById('fallbackIcon').style.display='inline-block';">
              <i class="fas fa-shield-alt fa-3x mb-3" id="fallbackIcon" style="display: none;"></i>
              <h2 class="mb-0">Gestore File Sicuro</h2>
              <p class="mb-0 opacity-75">
                Sistema di Archiviazione Cloud Protetto
              </p>
            </div>
            <div class="login-body">
              <div id="errorAlert" class="alert alert-danger d-none">
                <i class="fas fa-exclamation-triangle me-2"></i>
                <span id="errorMessage">Credenziali non valide</span>
              </div>

              <form method="POST" action="/login">
                <div class="mb-3">
                  <label for="username" class="form-label">
                    <i class="fas fa-user me-2"></i>Nome Utente
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    id="username"
                    name="username"
                    required
                    placeholder="inserisci nome utente"
                  />
                </div>
                <div class="mb-4">
                  <label for="password" class="form-label">
                    <i class="fas fa-lock me-2"></i>Password
                  </label>
                  <div class="input-group">
                    <input
                      type="password"
                      class="form-control"
                      id="password"
                      name="password"
                      required
                      placeholder="inserisci password"
                    />
                    <button class="btn btn-outline-secondary" type="button"
                            onclick="togglePassword('password', 'eyeLogin')"
                            tabindex="-1" title="Mostra/nascondi password">
                      <i class="fas fa-eye" id="eyeLogin"></i>
                    </button>
                  </div>

                  <!-- Barra forza password (identica all'admin) -->
                  <div class="password-strength" id="loginPasswordStrength"></div>

                  <!-- Requisiti con indicatori dinamici -->
                  <div class="password-requirements">
                    <small>
                      <i class="fas fa-shield-alt me-1"></i>
                      <strong>Requisiti Password:</strong>
                    </small>
                    <ul>
                      <li id="req-length">Almeno 8 caratteri</li>
                      <li id="req-upper">Una lettera maiuscola</li>
                      <li id="req-lower">Una lettera minuscola</li>
                      <li id="req-number">Un numero</li>
                      <li id="req-special">Un carattere speciale (!@#$%^&*)</li>
                    </ul>
                  </div>
                </div>
                <button type="submit" class="btn btn-primary btn-login w-100">
                  <i class="fas fa-sign-in-alt me-2"></i>Accedi
                </button>
              </form>

              <div class="text-center mt-4">
                <div id="companyInfo" class="small text-muted">
                  <i class="fas fa-building me-1"></i>
                  <span id="companyName">Caricamento...</span><br>
                  <i class="fas fa-id-card me-1"></i>
                  <span id="companyVat">P.IVA: </span>
                  <span id="companyAddress"></span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="js/login.js"></script>
    <script src="js/company.js"></script>
  </body>
</html>
